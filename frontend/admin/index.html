<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C&O Group | Internal Command Access</title>
    <link rel="icon" type="image/png" href="../images/logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --color-onyx: #0A0A0A;
            --color-onyx-light: #161616;
            --color-gold: #D4AF37;
            --color-gold-dim: rgba(212, 175, 55, 0.1);
            --color-white: #FFFFFF;
            --color-grey: #888888;
            --color-crimson: #8A1538;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--color-onyx);
            color: var(--color-white);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(212, 175, 55, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeIn 1s ease;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: var(--color-white);
        }

        .brand-logo span { color: var(--color-gold); }

        .auth-container {
            background: var(--color-onyx-light);
            padding: 50px 40px;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .auth-container::after {
            content: "";
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, var(--color-gold-dim), transparent);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 10px;
        }

        .auth-subtitle {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--color-grey);
            text-align: center;
            margin-bottom: 40px;
            display: block;
        }

        .form-group { margin-bottom: 25px; position: relative; }

        .form-group i.input-icon {
            position: absolute;
            left: 0;
            bottom: 15px;
            color: var(--color-gold);
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 12px 35px 12px 30px; /* Extra padding on right for eye icon */
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: var(--color-white);
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            border-bottom-color: var(--color-gold);
        }

        .toggle-pass {
            position: absolute;
            right: 0;
            bottom: 15px;
            background: none;
            border: none;
            color: var(--color-grey);
            cursor: pointer;
            outline: none;
            transition: color 0.3s;
        }

        .toggle-pass:hover { color: var(--color-gold); }

        .btn-authenticate {
            width: 100%;
            background: var(--color-gold);
            color: var(--color-onyx);
            border: none;
            padding: 18px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-authenticate:hover {
            background: var(--color-white);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .auth-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.7rem;
            color: var(--color-grey);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="brand-header">
            <h1 class="brand-logo">C&O<span>.</span></h1>
        </div>

        <div class="auth-container">
            <h2 class="auth-title">Command Center</h2>
            <span class="auth-subtitle">Personnel Identification Required</span>

            <form id="adminLoginForm">
                <div class="form-group">
                    <i class="fa-solid fa-user-shield input-icon"></i>
                    <input type="text" id="adminUser" class="form-input" placeholder="ACCESS ID" required autocomplete="off">
                </div>

                <div class="form-group">
                    <i class="fa-solid fa-key input-icon"></i>
                    <input type="password" id="adminPass" class="form-input" placeholder="SECURITY KEY" required>
                    <button type="button" class="toggle-pass" id="togglePassBtn" title="Show Password">
                        <i class="fa-regular fa-eye" id="eyeIcon"></i>
                    </button>
                </div>

                <button type="submit" class="btn-authenticate" id="loginBtn">
                    Verify Identity <i class="fa-solid fa-fingerprint"></i>
                </button>

                <p class="error-msg" id="errorMsg">Unauthorized Access ID or Security Key.</p>
            </form>
        </div>

        <div class="auth-footer">
            Secure Terminal • Session Encrypted (AES-256)
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('adminLoginForm');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const passInput = document.getElementById('adminPass');
            const togglePassBtn = document.getElementById('togglePassBtn');
            const eyeIcon = document.getElementById('eyeIcon');

            // 1. Skip login if already verified with a valid Token
            if(localStorage.getItem('adminToken')) {
                window.location.href = 'dashboard.html';
            }

            // 2. Toggle Password Visibility
            togglePassBtn.addEventListener('click', () => {
                if (passInput.type === 'password') {
                    passInput.type = 'text';
                    eyeIcon.classList.remove('fa-eye');
                    eyeIcon.classList.add('fa-eye-slash');
                } else {
                    passInput.type = 'password';
                    eyeIcon.classList.remove('fa-eye-slash');
                    eyeIcon.classList.add('fa-eye');
                }
            });

            // 3. Login Submission Logic
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const inputUser = document.getElementById('adminUser').value.trim();
                const inputPass = document.getElementById('adminPass').value.trim();

                const originalBtnContent = loginBtn.innerHTML;
                loginBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Verifying...';
                loginBtn.disabled = true;
                errorMsg.style.display = 'none';

                try {
                    // Send credentials to the REAL backend API
                    const response = await fetch('https://cando-backend-api.onrender.com\/api/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: inputUser, password: inputPass })
                    });
                    
                    const data = await response.json();

                    if (response.ok && data.token) {
                        // SAVE THE VIP TOKEN!
                        localStorage.setItem('adminToken', data.token);
                        
                        loginBtn.innerHTML = '<i class="fa-solid fa-check"></i> Identity Verified';
                        loginBtn.style.backgroundColor = "#27ae60";
                        loginBtn.style.color = "white";
                        
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 800);
                    } else {
                        // Triggers if server says "Invalid Credentials"
                        errorMsg.innerText = "Unauthorized Access ID or Security Key.";
                        throw new Error("Invalid");
                    }
                } catch (error) {
                    if (error.message !== "Invalid") {
                        // Triggers if backend server is not running
                        errorMsg.innerText = "Server Offline. Please check backend connection.";
                    }
                    loginBtn.innerHTML = originalBtnContent;
                    loginBtn.disabled = false;
                    errorMsg.style.display = 'block';
                    
                    // Quick shake animation for error
                    const container = document.querySelector('.auth-container');
                    container.style.transform = 'translateX(-10px)';
                    setTimeout(() => container.style.transform = 'translateX(10px)', 50);
                    setTimeout(() => container.style.transform = 'translateX(-10px)', 100);
                    setTimeout(() => container.style.transform = 'translateX(0)', 150);
                }
            });
        });
    </script>
</body>
</html>
